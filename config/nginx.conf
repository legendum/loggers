# loggers.dev — Nginx site configuration
# Copy to /etc/nginx/sites-available/loggers.dev
# Then: ln -s /etc/nginx/sites-available/loggers.dev /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS and www → bare domain
server {
    listen 80;
    listen [::]:80;
    server_name loggers.dev www.loggers.dev;
    return 301 https://loggers.dev$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name loggers.dev www.loggers.dev;

    # TLS (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/loggers.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loggers.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Redirect www to bare domain
    if ($host = www.loggers.dev) {
        return 301 https://loggers.dev$request_uri;
    }

    # Item bodies cap at 64 KB (API enforced); allow slack for headers.
    client_max_body_size 128k;

    # Proxy to Bun server
    location / {
        proxy_pass http://127.0.0.1:3232;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE — pues per-user stream at /api/events. The only SSE surface in
    # loggers. Powers PWA live updates (useResource, useCounts). The CLI
    # uses HTTP long-poll on POST /fifo/:ulid/pop?block=<dur> for wakeups
    # and routes through the generic location / block above.
    location = /api/events {
        gzip off;
        proxy_pass http://127.0.0.1:3232;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # Service worker must not be cached long-term (updates use same URL)
    location = /dist/sw.js {
        alias /home/deploy/loggers/public/dist/sw.js;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # Static assets — content-hashed, cache forever
    location /dist/ {
        alias /home/deploy/loggers/public/dist/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Install script (CLI one-liner from the web UI)
    location = /install.sh {
        alias /home/deploy/loggers/public/install.sh;
        default_type text/plain;
    }
}
