pues:
  - core
  - theme
  - style
  - auth
  - billing
  - db
  - objects
  - sse
  - pwa

objects:
  resources:
    loggers:
      table: loggers

core:
  name: loggers

# `base/style/` reads `style:`. Emit `--bg-page: var(--pues-bg-page)` …
# so loggers' pre-pues CSS that references the unprefixed token names
# resolves without a hand-maintained alias block in main.css.
style:
  aliases: true
  # Emit the shared app-shell base reset (box-sizing, html/body sizing,
  # body font/bg/color, #root height) instead of hand-rolling it here.
  reset: true

db:
  path: data/loggers.db

pwa:
  icon192: /loggers-192.png
  icon512: /loggers-512.png

billing:
  topup_url: https://legendum.co.uk/account
  charges:
    logger_create:
      amount: 2
      description: "loggers.dev logger"
  tabs:
    ingest_write:
      description: "loggers.dev writes"
      threshold: 2
      default_amount: 0.001
